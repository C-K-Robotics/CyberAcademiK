name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; never cancel a run mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        # Base path must match the repository name for project Pages sites
        # (https://<user>.github.io/<repo>/). Derived so a rename just works.
        run: yarn build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: SPA fallback for client-side routing
        # GitHub Pages serves 404.html for any unmatched path. Mirroring
        # index.html lets BrowserRouter deep-links (e.g. /courses/<slug>)
        # resolve to the SPA instead of a hard 404.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
